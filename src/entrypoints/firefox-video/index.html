<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Browser Recorder — Video capture</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #09090b;
        color: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .card {
        max-width: 400px;
        width: 100%;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      h1 { font-size: 1.125rem; font-weight: 600; }
      p  { font-size: 0.875rem; color: #a1a1aa; line-height: 1.5; }
      .tab-name { color: #fafafa; font-weight: 500; }
      button {
        width: 100%;
        padding: 0.625rem 1rem;
        border-radius: 6px;
        border: none;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        background: #fafafa;
        color: #09090b;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.9; }
      button:disabled { opacity: 0.4; cursor: default; }
      .status {
        font-size: 0.8125rem;
        color: #a1a1aa;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #ef4444;
        animation: pulse 1.4s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.35; }
      }
      .error { color: #f87171; font-size: 0.8125rem; }
    </style>
  </head>
  <body>
    <div class="card" id="root"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
