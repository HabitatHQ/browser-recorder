name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pnpm 11.12.0 is a broken, deprecated release — its self-installer throws
      # "Cannot use 'in' operator ... integrity"; 11.13.1 is the fixed patch.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      # postinstall runs `wxt prepare`, generating the types that `check` needs.
      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
